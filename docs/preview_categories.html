<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day Monitor — Categories Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { margin: 0; padding: 0; height: 700px; overflow: hidden; }
</style>
</head>
<body>
<div class="flex h-screen bg-gray-50 text-gray-900 font-sans" style="height:700px;width:1100px;">
  <!-- Sidebar -->
  <aside class="w-44 bg-white border-r border-gray-200 flex flex-col flex-shrink-0">
    <div class="p-4 text-base font-semibold border-b border-gray-200">☕ Day Monitor</div>
    <nav class="flex-1 p-2 space-y-1">
      <button class="w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 hover:bg-gray-50"><span>📊</span> Timeline</button>
      <button class="w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 bg-gray-100 font-medium"><span>🥧</span> Categories</button>
      <button class="w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 hover:bg-gray-50"><span>📈</span> Trends</button>
      <button class="w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 hover:bg-gray-50"><span>📱</span> Apps</button>
      <button class="w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 hover:bg-gray-50"><span>📋</span> Events</button>
      <button class="w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 hover:bg-gray-50"><span>✨</span> AI Report</button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="flex items-center gap-3 px-6 py-3 border-b border-gray-200 bg-white">
      <div class="flex gap-1">
        <button class="px-3 py-1 text-xs rounded border bg-gray-900 text-white border-gray-900">Today</button>
        <button class="px-3 py-1 text-xs rounded border border-gray-300 hover:bg-gray-100">7d</button>
        <button class="px-3 py-1 text-xs rounded border border-gray-300 hover:bg-gray-100">30d</button>
      </div>
      <input type="date" value="2026-06-01" class="ml-auto text-sm border border-gray-300 rounded px-2 py-1"/>
    </header>

    <main class="flex-1 overflow-auto p-6">
      <h2 class="text-lg font-semibold mb-6">Today — Category Breakdown</h2>

      <div class="flex gap-8 items-start">
        <!-- Donut chart using conic-gradient -->
        <div class="flex-shrink-0">
          <div style="
            width:220px;height:220px;border-radius:50%;
            background: conic-gradient(
              #3b82f6 0% 50%,
              #06b6d4 50% 70%,
              #a855f7 70% 82%,
              #ef4444 82% 92%,
              #f59e0b 92% 97%,
              #ec4899 97% 100%
            );
            position:relative;
          ">
            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:110px;height:110px;background:white;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;">
              <div class="text-2xl font-bold">6h38m</div>
              <div class="text-xs text-gray-500">total today</div>
            </div>
          </div>
        </div>

        <!-- Legend + stats -->
        <div class="flex-1 space-y-3">
          <div class="flex items-center gap-3">
            <div style="width:12px;height:12px;border-radius:2px;background:#3b82f6;flex-shrink:0;"></div>
            <div class="flex-1">
              <div class="flex justify-between text-sm">
                <span class="font-medium">coding</span>
                <span class="text-gray-600">3h 20m &nbsp; <span class="font-semibold">50%</span></span>
              </div>
              <div class="h-1.5 bg-gray-100 rounded-full mt-1"><div style="width:50%;background:#3b82f6;height:100%;border-radius:9999px;"></div></div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div style="width:12px;height:12px;border-radius:2px;background:#06b6d4;flex-shrink:0;"></div>
            <div class="flex-1">
              <div class="flex justify-between text-sm">
                <span class="font-medium">browser</span>
                <span class="text-gray-600">1h 18m &nbsp; <span class="font-semibold">20%</span></span>
              </div>
              <div class="h-1.5 bg-gray-100 rounded-full mt-1"><div style="width:20%;background:#06b6d4;height:100%;border-radius:9999px;"></div></div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div style="width:12px;height:12px;border-radius:2px;background:#a855f7;flex-shrink:0;"></div>
            <div class="flex-1">
              <div class="flex justify-between text-sm">
                <span class="font-medium">slack</span>
                <span class="text-gray-600">48m &nbsp; <span class="font-semibold">12%</span></span>
              </div>
              <div class="h-1.5 bg-gray-100 rounded-full mt-1"><div style="width:12%;background:#a855f7;height:100%;border-radius:9999px;"></div></div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div style="width:12px;height:12px;border-radius:2px;background:#ef4444;flex-shrink:0;"></div>
            <div class="flex-1">
              <div class="flex justify-between text-sm">
                <span class="font-medium">meeting</span>
                <span class="text-gray-600">42m &nbsp; <span class="font-semibold">10%</span></span>
              </div>
              <div class="h-1.5 bg-gray-100 rounded-full mt-1"><div style="width:10%;background:#ef4444;height:100%;border-radius:9999px;"></div></div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div style="width:12px;height:12px;border-radius:2px;background:#f59e0b;flex-shrink:0;"></div>
            <div class="flex-1">
              <div class="flex justify-between text-sm">
                <span class="font-medium">email</span>
                <span class="text-gray-600">22m &nbsp; <span class="font-semibold">5%</span></span>
              </div>
              <div class="h-1.5 bg-gray-100 rounded-full mt-1"><div style="width:5%;background:#f59e0b;height:100%;border-radius:9999px;"></div></div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div style="width:12px;height:12px;border-radius:2px;background:#ec4899;flex-shrink:0;"></div>
            <div class="flex-1">
              <div class="flex justify-between text-sm">
                <span class="font-medium">design</span>
                <span class="text-gray-600">8m &nbsp; <span class="font-semibold">2%</span></span>
              </div>
              <div class="h-1.5 bg-gray-100 rounded-full mt-1"><div style="width:2%;background:#ec4899;height:100%;border-radius:9999px;"></div></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
